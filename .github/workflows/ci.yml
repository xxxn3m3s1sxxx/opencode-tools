name: opencode-tools CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check --output-format=github .

      - name: mypy check
        run: pip install mypy types-PyYAML && mypy --ignore-missing-imports . || true

  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # ── Version checks (cross-platform) ──
      - name: engine versions
        shell: python
        run: |
          import subprocess, sys, os
          tools = ['hashline', 'impact', 'verify', 'calltrace', 'rename',
                   'graph', 'changelog', 'search', 'lint', 'refactor']
          for t in tools:
              r = subprocess.run([sys.executable, f'{t}.py', '--version'],
                                 capture_output=True, text=True, timeout=10)
              if r.returncode == 0:
                  print(f'[OK] {t}: {r.stdout.strip()}')
              else:
                  print(f'[WARN] {t}: exit {r.returncode}')

      # ── Hashline suite ──
      - name: hashline core tests
        shell: python
        run: |
          import subprocess, sys
          for t in ['test_hashline.py', 'regression_tests.py', 'stress_test.py', 'deeper_tests.py']:
              r = subprocess.run([sys.executable, t], capture_output=True, text=True, timeout=120)
              print(f'[{chr(0x2713) if r.returncode == 0 else chr(0x2717)}] {t}')
              if r.returncode != 0:
                  print(r.stderr[-2000:])

      # ── Tool unit tests ──
      - name: unit test suite
        shell: python
        run: |
          import subprocess, sys
          tests = ['test_changelog', 'test_graph', 'test_impact', 'test_lint',
                   'test_refactor', 'test_search', 'test_trace', 'test_verify']
          for t in tests:
              r = subprocess.run([sys.executable, '-m', 'unittest', t],
                                 capture_output=True, text=True, timeout=120)
              ok = r.returncode == 0
              print(f'[{chr(0x2713) if ok else chr(0x2717)}] {t}')
              if not ok:
                  print(r.stderr[-2000:])

      # ── Regression tests ──
      - name: regression tests
        run: python test_regression.py

      # ── Stress tests ──
      - name: stress tests
        run: python stress_tools.py

      # ── Installer integration (Windows) ──
      - name: installer tests
        if: runner.os == 'Windows'
        run: python test_installers.py

      # ── Bundle check ──
      - name: bundle check
        shell: python
        run: |
          import json
          p = json.load(open('package.json'))
          assert p['version'] == '0.3.0', f'version mismatch: {p["version"]}'
          print(f'[OK] package.json v{p["version"]}')
          files = p.get('files', [])
          assert 'utils.ts' in files, 'utils.ts missing'
          assert 'calltrace.py' in files, 'calltrace.py missing'
          print(f'[OK] {len(files)} files in manifest')
