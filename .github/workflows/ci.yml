name: opencode-tools CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # ── Version checks ──
      - name: engine versions
        run: |
          for t in hashline impact verify calltrace rename graph changelog search lint refactor; do
            python ${t}.py --version 2>/dev/null && echo "[OK] $t" || echo "[WARN] $t: empty output"
          done

      # ── Hashline suite ──
      - name: hashline core tests
        run: python test_hashline.py
      - name: hashline regression tests
        run: python regression_tests.py
      - name: hashline stress tests (16)
        run: python stress_test.py
      - name: hashline deep edge tests
        run: python deeper_tests.py

      # ── Tool unit tests ──
      - name: changelog test suite
        run: python test_changelog.py
      - name: graph test suite
        run: python test_graph.py
      - name: impact test suite
        run: python test_impact.py
      - name: lint test suite
        run: python test_lint.py
      - name: refactor test suite
        run: python test_refactor.py
      - name: search test suite
        run: python test_search.py
      - name: trace/calltrace test suite
        run: python test_trace.py
      - name: verify test suite
        run: python test_verify.py

      # ── Regression tests (19 bugs from 2026-05-21) ──
      - name: regression tests (24)
        run: python test_regression.py

      # ── Stress tests ──
      - name: tools stress tests (37)
        run: python stress_tools.py

      # ── Installer integration (Windows/PowerShell only) ──
      - name: installer tests (Windows)
        if: runner.os == 'Windows'
        run: python test_installers.py

      # ── Bundle check ──
      - name: bundle check
        run: python -c "
      import json;
      p = json.load(open('package.json'));
      assert p['version'] == '0.3.0';
      print(f'[OK] package.json v{p[\"version\"]}');
      files = p.get('files', []);
      print(f'[OK] {len(files)} files in manifest');
      assert 'utils.ts' in files, 'utils.ts missing';
      "
